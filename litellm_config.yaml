litellm_settings:
  request_timeout: 600
  set_verbose: False
  json_logs: true
  drop_params: true
  vertex_project: os.environ/VERTEX_PROJECT
  vertex_location: "us-central1"

general_settings:
  proxy_batch_write_at: 60
  master_key: sk-1234
  database_connection_pool_limit: 10
  allow_requests_on_db_unavailable: True

router_settings:
  fallbacks: []

credential_list:
  - credential_name: default_aws_bedrock_credential
    credential_info:
      description: "Production credentials for AWS Bedrock models"
    credential_values:
      aws_access_key_id: os.environ/AWS_ACCESS_KEY_ID
      aws_secret_access_key: os.environ/AWS_SECRET_ACCESS_KEY
  - credential_name: default_dial_credential
    credential_info:
      description: "Production credentials for DIAL models"
    credential_values:
      api_base: https://ai-proxy.lab.epam.com
      api_key: os.environ/DIAL_API_KEY
  - credential_name: default_azure_openai_credential
    credential_info:
      description: "Production credentials for Azure OpenAI models from Azure account of Codemie"
    credential_values:
      tenant_id: os.environ/AZURE_TENANT_ID
      client_id: os.environ/AZURE_CLIENT_ID
      client_secret: os.environ/AZURE_CLIENT_SECRET
