[tool.poetry.extras]
enterprise = ["codemie-enterprise"]
pdf-svg = ["cairosvg"]

[tool.poetry.group.dev.dependencies]
pytest = "^8.3.1"
pytest-asyncio = "^0.23.7"
pytest-cov = "^5.0.0"
pytest-env = "^1.1.3"
pytest-mock = "^3.14.0"
ruff = "^0.5.4"
pytest-httpx = "^0.35.0"
pre-commit = "^3.8.0"
pip-licenses = "^5.5.0"

[[tool.poetry.source]]
name = "codemie-artifact-registry-gcp"
url = "https://europe-west3-python.pkg.dev/or2-msq-epmd-edp-anthos-t1iylu/codemie-enterprise-python/simple/"
priority = "explicit"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
indent-width = 4
line-length = 120

[tool.ruff.format]
quote-style = "preserve"
indent-style = "space"


[tool.ruff.lint]
# Enable rules, in addition to the defaults.
select = ["E", "F", "B", "N", "C4", "G", "T20", "RSE", "SIM", "C", "W", "PERF", "ISC"]

ignore = [
    "B008",
    "B009",
    "B027",
    "B904",
    "G004",
    "N805",
    "N815",
    "N818",
    "ISC001",   # Conflicts with formatter
    "ISC003",   # Allow explicit string concatenation with +
    "PERF401", # Fix this issue and remove from ignore
    "PERF403", # Fix this issue and remove from ignore
]

# Avoid trying to fix flake8-bugbear (`B`) violations.
unfixable = ["B"]

[tool.ruff.lint.isort]
known-first-party = ["codemie", "codemie_tools"]

[tool.ruff.lint.mccabe]
# Flag errors (`C901`) whenever the complexity level exceeds the value below.
max-complexity = 16

[tool.ruff.lint.per-file-ignores]
"plugin_toolkit.py" = ["SIM108"]
"*plugin/generated/*" = ["ALL"]
"src/external/*" = ["ALL"]
"src/codemie/clients/provider/client/*" = ["ALL"]
"src/codemie_tools/*" = ["B007", "B010", "B020", "B905", "N802", "G201", "F401"]

"tests/*" = ["E501", "SIM117", "B905"]
"*template*" = ["E501"]
"*prompt*" = ["E501"]
"*_vars*" = ["E501"]
"*_tool*" = ["E501"]
"prebuilt_assistants.py" = ["E501"]
"scripts/memory_analysis/*" = ["T201", "SIM108"]
"src/external/utility_scripts/import_katas.py" = ["T201"]  # CLI script needs print statements
"src/codemie/service/kata_import_service.py" = ["C901", "SIM102"]  # Validation function needs comprehensive checks
"src/codemie/service/analytics/queries/ai_adoption_framework/composite_queries.py" = ["E501"]
"src/codemie/service/analytics/queries/ai_adoption_framework/query_builder.py" = ["E501"]
"src/codemie/service/analytics/queries/ai_adoption_framework/dimension_queries.py" = ["E501"]
"src/codemie/service/analytics/queries/ai_adoption_framework/score_expressions.py" = ["E501"]

[tool.poetry.scripts]
download_nltk_packages = "src.external.utility_scripts.setup_nltk:download_nltk_packages"
import-katas = "src.external.utility_scripts.import_katas:main"

[tool.pip-licenses]
ignore-packages = [
    "grep-ast", # UNKNOWN, it is Apache License 2.0
    "filelock", # Unlicense
    "docx2txt", # UNKNOWN, it is MIT License
    "langgraph-bigtool", # UNKNOWN
    "tiktoken", # MIT License
    "llm-sandbox", # UNKNOWN, it is MIT License
    "codemie-sdk-python", # UNKNOWN
    "codemie-enterprise", # UNKNOWN
    "email-validator" # The Unlicense (Unlicense)
]
allow-only = """
    3-Clause BSD License;\
    Apache 2.0;\
    Apache Software License;\
    Apache Software License; BSD License;\
    Apache Software License; MIT License;\
    Apache-2.0;\
    Apache-2.0 AND BSD-2-Clause;\
    Apache-2.0 AND MIT;\
    Apache-2.0 OR BSD-3-Clause;\
    Apache-2.0 OR MIT;\
    BSD 3-Clause OR Apache-2.0;\
    BSD License;\
    BSD-2-Clause;\
    BSD-2-Clause AND Apache-2.0 WITH LLVM-exception;\
    BSD-3-Clause;\
    BSD-3-Clause, Apache-2.0, dependency licenses;\
    GNU Lesser General Public License v2 or later (LGPLv2+);\
    GNU Lesser General Public License v3 (LGPLv3);\
    GNU Lesser General Public License v3 or later (LGPLv3+);\
    LGPLv3+;\
    GNU Library or Lesser General Public License (LGPL);\
    ISC License (ISCL);\
    LGPL-3.0-only;\
    MIT;\
    MIT License;\
    MIT License; Mozilla Public License 2.0 (MPL 2.0);\
    MIT-CMU;\
    Mozilla Public License 2.0 (MPL 2.0);\
    PSF-2.0;\
    Python Software Foundation License;\
    Simplified BSD;\
    MPL-2.0 AND (Apache-2.0 OR MIT);\
    MPL-2.0;\
"""
