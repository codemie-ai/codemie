[project]
name = "codemie"
requires-python = ">=3.12,<4.0"

[tool.poetry]
name = "codemie"
version = "0.8.0"
description = "Research and Development project to automate doc generation/QnA for repos"
authors = [
    "Vadym Vlasenko <vadym_vlasenko@epam.com>",
    "Andriy Lukashchuk <andriy_lukashchuk@epam.com>",
    "Sviatoslav Likhtarchyk <sviatoslav_likhtarchyk@epam.com>",
]
readme = "README.md"
include = ["llm-templates/**/*"]
packages = [{ include = "codemie", from = "src" }, { include = "codemie_tools", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.12,<3.14" # upper limit is required because of youtube-transcript-api from markitdown
