{{- if .Values.argoRollout.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "codemie.fullname" . }}-preview
  labels:
    {{- include "codemie.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "codemie.selectorLabels" . | nindent 4 }}
{{- end }}
