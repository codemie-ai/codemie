{{- if and .Values.proxyPool.enabled .Values.proxyPool.argoRollout.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "codemie.proxy-pool.fullname" . }}-preview
  labels:
    {{- include "codemie.labels" . | nindent 4 }}
  {{- with .Values.proxyPool.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.proxyPool.service.type }}
  ports:
    - port: {{ .Values.proxyPool.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "codemie.proxy-pool.selectorLabels" . | nindent 4 }}
{{- end }}
