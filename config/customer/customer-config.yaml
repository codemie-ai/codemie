    settings:
      enabled: true
      name: "AI TestMate"
      url: "/aitestmate"
      type: "link"
      description: "Autonomous GenAI solution that automatically generates and commits unit tests, increasing coverage and reducing team effort in software development."
      created_by: "DPEO"
      icon_url: "https://github.com/alk-epam/test-repo/blob/0f6b0e1dde1df59f92aa95a5a40afbb78da87531/ai_testmate_small.png?raw=true"
