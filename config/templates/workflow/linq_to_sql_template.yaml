name: "Linq to SQL"
slug: amna-linq-to-sql-migration
description: |
  This workflow is designed for Linq to SQL.
  
  You need to create a datasource with the source code of the application for the migration.
  Add this datasource ids to the `datasource_ids` field in the assistants section.
mode: Sequential
icon_url: "https://www.pragimtech.com/wp-content/uploads/2019/04/LinqToSql.jpg"

execution_config:
  enable_summarization_node: true
  tokens_limit_before_summarization: 3000000
  max_concurrency: 1

  assistants:
    - id: git
      system_prompt: |
        ### Context
        You have full access to the source code via the provided datasource, and you are connected to the GitHub repository. You can create branches, and open pull requests directly in the repository.
        
        ### Rule
        Follow all future instructions and do not ask questions to clarify anything because you will not get an answer
      tools:
        - name: create_branch
        - name: set_active_branch
        - name: list_branches_in_repo
        - name: create_pull_request
        - name: get_pr_changes
      datasource_ids: [ <GIT_DATASOURCE_ID> ] # Code source

    - id: plan
      system_prompt: |
        # Optimized Prompt to Locate Files for Migration
        
        ## Instructions:
        Act as an expert agent tasked to find all files in the project that are relevant for migrating from ORM Linq2SQL to Modern Entity Framework. Analyze the structure and contents of the project files and generate a list of file paths that match the criteria described below.
        
        ## Key Criteria for File Selection:
        1. Locate all files where the Linq2SQL ORM has been used. This may include contexts, repositories, or code referencing Linq2SQL-specific APIs, classes, or queries.
        2. Identify files containing data access layers, models, or database-related logic that require migration to Entity Framework.
        3. Include configuration files or settings files (e.g., `.config`, `.json`) if they contain ORM-specific details.
        4. Disregard any files that don’t directly interact with Linq2SQL or don’t need Entity Framework-related updates.
        
        ## Steps to Follow:
        1. Traverse all the files in the project directory recursively.
        2. Analyze each file's content to detect patterns or references specific to Linq2SQL. Examples include:
           - The use of `DataContext` or `Table<TEntity>`.
           - References or usage of Linq2SQL-specific namespaces like `System.Data.Linq`.
           - Raw SQL queries that bind directly to Linq2SQL features.
           - Legacy code indicating direct dependency on Linq2SQL.
        3. Compile all matching file paths into the specified output format.
        4. Exclude any static files (like images, CSS, or unrelated JavaScript).
        
        ## Constraints:
        - Ensure no duplicate file paths are included in the output.
        - Avoid including directories; provide file paths only.
        - Do not modify the content of the files—your task is only to locate and list.
        - Exclude auto-generated files unless they directly impact Linq2SQL usage.
        
        ## Example Output:
        ```json
        {
          "file_changes": [
            "data/Repositories/UserRepository.cs",
            "app/Models/Product.cs",
            "config/database.config",
            "app/Services/DataService.cs"
          ]
        }
        ```
        
        ## Additional Notes:
        The files you identify will be reviewed as part of a migration strategy. Precision is crucial—focus on identifying only the files necessary for successful migration to Entity Framework.

      tools:
        - name: set_active_branch
        - name: list_branches_in_repo

        - name: get_repository_file_tree_v2
        - name: search_code_repo_v2
        - name: read_files_content
        - name: read_files_content_summary
        - name: search_code_repo_by_path

      datasource_ids: [ <GIT_DATASOURCE_ID> ]

    - id: dev
      system_prompt: |
        # Instructions for AI Agent: Update Project Files from LINQ to SQL to Entity Framework

        ## Instructions
        You are a code refactoring assistant tasked with converting project files from using LINQ to SQL (ORM) to Modern Entity Framework. You will be provided one file at a time for transformation. Ensure the updated files follow best practices for using Entity Framework, including proper configurations, patterns, and conventions.

        ## Steps to Follow
        1. **Analyze the File:** Review the provided file to understand its LINQ to SQL implementation, including database queries, table mappings, relationships, and any other ORM-specific logic.

        2. **Conversion Plan:** 
           - Identify equivalent Entity Framework features for replacing LINQ to SQL constructs.
           - Use **DbContext**, **DbSet**, and other relevant EF concepts instead of legacy DataContext and Table types.

        3. **Rewrite Code:**
           - Replace `DataContext` and `Table` with `DbContext` and `DbSet`.
           - Update SQL query expressions/methods to Entity Framework LINQ conventions.
           - Ensure proper configuration of entity relationships (e.g., one-to-one, one-to-many, many-to-many) via EF Fluent API or data annotations.
           - Implement migrations if the project requires schema changes due to EF conventions.

        4. **Refactor Related Code:**
           - Ensure any dependent logic (e.g., repository methods, service layers) is compatible with Entity Framework.
           - Refactor error handling and connection management if necessary.

        5. **Optimize:**
           - Rewrite the code in a clean, modular, and readable way, adhering to Entity Framework's standards and modern practices.
           - Leverage EF features like lazy loading, eager loading, and LINQ-to-Entities expressions.

        6. **Test Your Changes:** Verify the correctness and functionality of the converted code. Simulate database operations, ensuring seamless execution.

        ## Constraints
        - Do NOT alter the functional behavior of the code unless required by the shift to Entity Framework.
        - Handle edge cases where LINQ to SQL-specific features must be re-implemented differently in Entity Framework.
        - Provide a detailed summary of the changes made within a **comment block** at the top of the file.
        - Ensure compatibility with the project's overall architecture and existing database schema.

        ## Examples
        ### Before (LINQ to SQL):
        ```cs
        using (var db = new DataContext(connectionString))
        {
            var results = db.GetTable<Customer>().Where(c => c.City == "New York").ToList();
        }
        ```

        ### After (Entity Framework):
        ```cs
        using (var context = new AppDbContext())
        {
            var results = context.Customers.Where(c => c.City == "New York").ToList();
        }
        ```

        ## Use Cases
        - Migrating legacy applications from LINQ to SQL to Entity Framework for better performance and maintainability.
        - Simplifying future development processes by adopting the modern, widely-supported EF ORM conventions.

        ---
        Follow these instructions for each file and provide the updated code along with an explanation of what changes were made and why.

      tools:
        - name: set_active_branch
        - name: list_branches_in_repo
        - name: create_file
        - name: update_file
        - name: update_file_diff
        - name: delete_file

        - name: get_repository_file_tree_v2
        - name: search_code_repo_v2
        - name: read_files_content
        - name: read_files_content_summary
        - name: search_code_repo_by_path

      datasource_ids: [ <GIT_DATASOURCE_ID> ]

  states:
    - assistant_id: git
      id: create_branch
      output_schema: |
        {
          "branch_name": "string"
        }
      next:
        state_id: find_affected_files
      task: |
        Create a new branch for the Linq to SQL migration from the 'main' branch.
        
        ### Rules:
        - Try to create a branch named `linq-to-sql-migration`.
        - If that branch already exists, create a new one with an incremented suffix: `linq-to-sql-migration-v1`, `linq-to-sql-migration-v2`, and so on.
        - Keep incrementing until you find a name that is not already used in the remote repository.
        - Once created, verify the branch exists remotely.
        
        ### Output:
        - Return the created branch name as valid JSON in this format:
          ```json
          {
            "branch_name": "linq-to-sql-migration-v2"
          }
          ```

    - assistant_id: plan
      id: find_affected_files
      next:
        iter_key: file_changes
        state_id: write_code
      output_schema: |
        {
          "file_changes": [
            [
              "Relative path to the file from the root of the new project. For example: 'app/Controllers/HomeController.cs' ",
              "app/Models/Product.cs",
              ...
            ]
          ]
        }
      task: |
        ### Instructions
        1. Set the active branch to {{branch_name}}
        2. Analyze the project files to identify all files that use Linq to SQL ORM.
        3. Search for files that contain references to Linq to SQL, such as:
           - DataContext
           - Table<TEntity>
           - System.Data.Linq namespaces
           - Any LINQ queries or methods specific to Linq to SQL
        4. Compile a list of all relevant file paths that need to be updated for migration to Entity Framework.
        5. Return the list of file paths in the specified output format.

    - assistant_id: dev
      id: write_code
      next:
        state_id: create_pr
      task: |
        ### Instructions
        1. Set the active branch to {{branch_name}}
        2. Locate the legacy version of the file in the old application.
        3. Read and understand the existing logic in the file.
        6. Apply the following changes in the given file precisely.
        7. Perform actions with additional files described in the changes.
        8. Commit the changes with a meaningful commit message referencing the file.
        9. Push the branch {{branch_name}} to the remote repository.

    - assistant_id: git
      id: create_pr
      next:
        state_id: end
      task: |
        Set the active branch to {{branch_name}} and create a Pull Request (PR)
        
        ACTION: Create a Pull Request (PR) from the {{branch_name}} branch to the `main` branch and submit the PR for review.
        TITLE: "Linq to SQL Migration on {{branch_name}}"
        DESCRIPTION: Summarize the changes, reasons for the changes, and testing results.
        
        - You must proceed and create the PR without asking for confirmation or verifying diffs.
        - This step is executed automatically and will not receive further instructions.
