---
name: Iteration Workflow Example
description:
  Example of sequential workflow that iterates through multiple nodes with the same key.
  Useful when you need to create documentation and perform extra steps with generated content.
  Uses map-reduce feature that runs nodes in parallel. 
  After reduction operations triggers 3 different steps with custom logic for further processing
mode: Sequential
slug: template-iteration-workflow


execution_config:
  assistants:
    - id: generic
      model: 'gpt-4.1-mini'
      system_prompt: Answer to use queries
    
    - id: translator
      model: 'gpt-4.1-mini'
      system_prompt: Translate the input to the language requested

  states:
    - id: generate_colors
      assistant_id: generic
      task: |
        Generate a list of 3 colors
      output_schema: |
        {
          "colors": ["orange", "blue", "red", ...]
        }
      next:
        state_id: generate_text
        iter_key: colors
    - id: generate_text
      assistant_id: generic
      task: |
        Generate a text about a color
      next:
        state_id: merge
    - id: merge
      assistant_id: generic
      task: Merge all texts into one
      next:
        state_ids:
          - translate_to_spanish
          - translate_to_german
          - translate_to_french 
    - id: translate_to_spanish
      assistant_id: translator
      task: >
        Translate texts to Spanish
      next:
        state_id: summary
    - id: translate_to_german
      assistant_id: translator
      task: >
        Translate texts to German
      next:
        state_id: summary
    - id: translate_to_french
      assistant_id: translator
      task: |
        Translate texts to french
      next:
        state_id: summary
    - id: summary
      assistant_id: generic
      task: |
        Grade each translation from 1 to 10
      next:
        state_id: end