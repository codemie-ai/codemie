name: epam-simple-deck
description: >-
  Use this skill to create or update presentation, create or update outline or build a presentation part. The presentation will be in PowerPoint (pptx) format and will follow EPAM template and brand guidelines.
content: |-
  # Overview
  This skill provides instructions on how to create/update PPTX presentation end-to-end (see references/HOWTO_BUILD_PRESENTATION.md) and also detailed instructions on some steps in that process that can be done separately.

  # How tos
  - How to create/update presentation - references/HOWTO_BUILD_PRESENTATION.md
  - How to create outline - references/HOWTO_BUILD_OUTLINE.md
  - How to create/update single presentation part - references/HOWTO_BUILD_SINGLE_PRESENTATION_PART.md

  Read only how-tos directly related to your task.

  # Default file locations
  - User's request - `presentation.request`
  - Outline - `presentation.outline`
  - Design guidelines - `presentation.design`
  - Presentation main script - `presentation.py`
  - Script for a presentation's part - `presentation_part<X>.py`
project: codemie
visibility: public
categories:
  - project_management
