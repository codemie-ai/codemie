name: codemie-speech-presentation-content
description: >-
  Generate engaging spoken content for video presentations and text-to-speech systems for CodeMie. 
  Use when creating video narration, demo scripts, marketing video content, presentation voiceovers, 
  speech recordings, or any spoken content for AI voice synthesis. 
  Triggers: "create speech", "write narration", "video script", "presentation speech", "text to speech", 
  "spoken content", "voiceover", "demo script", "recording script", working with speech or presentation recording projects.
content: |-
  # Speech Presentation Content Generation

  Generate engaging and fluent spoken content for video presentations, designed for natural delivery by text-to-speech systems.

  ## Core Approach

  Analyze the user's input style and tone, then produce clear, attractive, audience-friendly presentations suitable for vocal delivery. Mirror the user's writing style while optimizing for spoken word.

  ## Content Generation Steps

  1. **Analyze Input**: Study the user's style, tone, and language
  2. **Generate Content**: Create continuous, spoken prose that mirrors their approach
  3. **Apply Transformations**: Replace restricted terms and symbols
  4. **Add Natural Pauses**: Insert line breaks for emphasis and comprehension

  ## Text Formatting Rules

  ### Symbol Restrictions

  Do not use these symbols anywhere in the output:
  - Forward slash: `/`
  - Comma: `,`
  - Hyphen: `-`
  - Underscore: `_`

  These symbols must not appear in any word or part of the script.

  ### Format Requirements

  **Use continuous spoken prose**:
  ```
  ✅ The system processes data in three stages. First it validates the input. 
     Then it transforms the content. Finally it generates the output.

  ❌ The system processes data in three stages:
     - Validates input
     - Transforms content  
     - Generates output
  ```

  **No structured lists**:
  - No bullet points
  - No numbered lists
  - No similar formatting

  ### Term Replacements

  Apply these transformations automatically:

  **Product Names**:
  - "CodeMie" → "CodeMi"

  **Technical Terms**:
  - "AI-run" → "AI run"
  - "AI/Run" → "AI run"
  - "AI_run" → "AI run"

  Apply this pattern to any term containing restricted symbols.

  ## Natural Pauses

  Insert 2-3 line breaks where pauses enhance:
  - **Comprehension**: Between major concepts or transitions
  - **Emphasis**: Before or after key points
  - **Pacing**: To prevent rushed delivery

  **Example with pauses**:
  ```
  Welcome to the new feature demonstration.


  Today we'll show you how to streamline your workflow with automated reporting.


  Let's start by looking at the dashboard.
  ```

  ## Language and Style

  - **Language**: Match the user's input language unless instructed otherwise
  - **Tone**: Align with user input style
  - **Marketing Language**: Avoid excessive marketing speak
  - **Clarity**: Use clear, direct language appropriate for technical audiences

  ## Example Workflow

  **Input**: Raw step-by-step feature walkthrough with technical details

  **Output**: Seamless spoken script with:
  - Natural conversational flow
  - Applied term replacements
  - Strategic pauses for emphasis
  - No restricted symbols
  - Continuous prose format

  ## Quality Checklist

  Before finalizing content:
  - [ ] No restricted symbols (/ , - _) anywhere in text
  - [ ] No bullet points or numbered lists
  - [ ] "CodeMie" replaced with "CodeMi"
  - [ ] Slash-based terms converted (AI/Run → AI run)
  - [ ] Natural pauses added with line breaks
  - [ ] Style matches user input
  - [ ] Content flows naturally when read aloud
  - [ ] Continuous prose throughout
