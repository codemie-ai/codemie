---
loaders:
  code_loader:
    languages_for_splitting:
      cpp:
        - .cpp
        - .h
        - .hpp
        - .cxx
        - .cc
        - .C
        - .c++
      go:
        - .go
      java:
        - .java
      js:
        - .js
      php:
        - .php
        - .phtml
        - .php3
        - .php4
        - .php5
        - .php7
        - .phps
        - .phpt
      proto:
        - .proto
      python:
        - .py
        - .pyc
        - .pyd
        - .pyo
        - .pyw
        - .pyz
      rst:
        - .rst
      ruby:
        - .rb
        - .rbx
        - .rjs
        - .rhtml
        - .ru
      rust:
        - .rs
      scala:
        - .scala
      swift:
        - .swift
      markdown:
        - .md
        - .markdown
      latex:
        - .tex
      html:
        - .html
        - .htm
        - .shtml
        - .xhtml
      sol:
        - .sol

    chunk_size: 2000
    tokens_size_limit: 2000
    chunk_overlap: 30
    summarization_max_tokens_limit: 4000
    summarization_tokens_overlap: 100
    summarization_batch_size: 10
    loader_batch_size: 250
    enable_multiprocessing: false
    excluded_extensions:
      common:
        - .ico
        - .mng
        - .bpm
        - .exe
        - .dll
        - .jar
        - .key
        - .mp3
        - .mp4
        - .otf
        - .pyc
        - .rar
        - .rtf
        - .tar
        - .gz
        - .webm
        - .zip
        - .xls
        - .lock
      docs_only:
        - .md
        - .toml
        - .json
        - .pdf
        - .xlsx
      code_only: []

  jira_loader:
    chunk_size: 1000
    chunk_overlap: 50
    loader_batch_size: 50

  json_loader:
    chunk_size: 2000
    chunk_overlap: 100

  confluence_loader:
    loader_max_pages: 1000         # Number of pages lazy_load holds in memory at once before yielding and moving to the next chunk
    loader_pages_per_request: 20   # Number of pages returned by a single Confluence API HTTP request (the ?limit= param)
    loader_batch_size: 50          # Number of Documents passed to one _process_batch call (splitting + embedding + ES write)
    loader_timeout: 180

  file_loader:
    chunk_size: 1500
    chunk_overlap: 100

  azure_devops_wiki_loader:
    chunk_size: 1000
    chunk_overlap: 50
    loader_batch_size: 50

  azure_devops_work_item_loader:
    chunk_size: 1000
    chunk_overlap: 50
    loader_batch_size: 50
    index_comments: true
    index_attachments: true

  xray_loader:
    chunk_size: 1000
    chunk_overlap: 50
    loader_batch_size: 50

  sharepoint_loader:
    loader_batch_size: 20
    loader_timeout: 300
    chunk_size: 2000
    chunk_overlap: 200
    max_file_size_mb: 50
    max_retries: 3
    graph_api_version: "v1.0"
    graph_base_url: "https://graph.microsoft.com"

storage:
  embeddings_max_docs_count: 20
  indexing_bulk_max_chunk_bytes: 104857600  # 100 MB
  indexing_max_retries: 2  # Reduced from 10: worst-case retry duration = max_retries × max_wait = 2 × 120 = 240s < stale_indexing_threshold_seconds (300s)
  indexing_error_retry_wait_min_seconds: 10
  indexing_error_retry_wait_max_seconds: 120  # Reduced from 600 to keep per-retry wait bounded
  indexing_threads_count: 20
  processed_documents_threshold: 1000  # Max amount of processed documents to store in elastic
  stale_indexing_threshold_seconds: 300
  stale_indexing_resume_batch_size: 5
  indexing_heartbeat_interval: 10  # Commit stats every N completed docs within a batch to keep update_date fresh and prevent false stale detection
