framework:
  title: "AI Champions Leaderboard"
  version: "2.0"
  principles:
    - title: "Capability Framework, Not Vanity Ranking"
      text: "The score identifies people who use AI productively at meaningful depth, not people who generate the most activity."
    - title: "Outcomes Over Raw Activity"
      text: "High usage alone is not enough. The model rewards asset maturity, workflow outcomes, engineering throughput, reuse by others, and learning."
    - title: "Explainable By Design"
      text: "Every dimension is built from explicit signals, normalized scores, and visible weights so leadership can trace why a user ranked where they did."
    - title: "Current Score Uses Implemented Signals Only"
      text: "V2 includes six implemented dimensions. Strategic overlays remain visible as roadmap items and are not counted today."
  calculation_steps:
    - "Collect user-level evidence from PostgreSQL, Elasticsearch, and LiteLLM spend data."
    - "Normalize each component to 0-1 using ratios, thresholds, percentile ranks, or deterministic heuristics."
    - "Compute each dimension as the weighted sum of its components."
    - "Compute total score as weighted sum of six dimensions, scaled to 0-100."
    - "Assign tiers: Pioneer >= 80, Expert >= 65, Advanced >= 45, Practitioner >= 25, Newcomer < 25."
  data_sources:
    - title: "PostgreSQL"
      text: "Primary system of record for assistants, workflows, executions, conversations, sharing, kata completion, datasources."
    - title: "Elasticsearch"
      text: "Enrichment layer for tool usage, MCP activity, lifecycle telemetry, CLI session metrics."
    - title: "LiteLLM Spend"
      text: "Authoritative spend data for CLI efficiency signal."
  future_overlays:
    - "Web Conversation Quality And Maturity"
    - "CLI Conversation Quality And Intent"
    - "Practical Project AI Experience"
    - "CV And Skills Profile Alignment"

tiers:
  - name: "pioneer"
    label: "Pioneer"
    plural_label: "Pioneers"
    level: 5
    min_score: 80
    color: "#fbbf24"
    description: "Top AI practitioners demonstrating excellence across multiple dimensions."
  - name: "expert"
    label: "Expert"
    plural_label: "Experts"
    level: 4
    min_score: 65
    color: "#94a3b8"
    description: "Strong AI users with broad capability and consistent high-quality usage."
  - name: "advanced"
    label: "Advanced"
    plural_label: "Advanced"
    level: 3
    min_score: 45
    color: "#f97316"
    description: "Solid AI practitioners with good breadth across platform and CLI."
  - name: "practitioner"
    label: "Practitioner"
    plural_label: "Practitioners"
    level: 2
    min_score: 25
    color: "#818cf8"
    description: "Growing AI users building capability across key dimensions."
  - name: "newcomer"
    label: "Newcomer"
    plural_label: "Newcomers"
    level: 1
    min_score: 0
    color: "#6b7280"
    description: "Early-stage users beginning their AI journey."

