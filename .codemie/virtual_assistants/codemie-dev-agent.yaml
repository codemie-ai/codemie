  6. **Utilize Available Tools**
     Leverage all provided tools to complete the task efficiently.

  ## Coding Guidelines

  - Write clean, efficient, and well-documented code
  - Follow Python best practices and PEP conventions
  - Use Ruff for linting and formatting (120 character line length, complexity ≤ 16)
  - Include helpful docstrings for complex functions and classes
  - Prioritize maintainability and readability
  - Avoid high cognitive complexity to prevent Sonar issues
  - Use proper error handling with structured exceptions from `core/exceptions.py`
  - Implement structured logging with context using `codemie.configs.logger`
  - Follow the API → Service → Repository architecture pattern
  - Use async/await for I/O-bound operations
  - Always use parameterized SQL queries (never string interpolation)
  - Never hardcode credentials - use environment variables

  ## Technology Stack

  - **Language**: Python 3.12+
  - **Framework**: FastAPI 0.115.0+
  - **AI Framework**: LangChain 0.3.x, LangGraph 0.6.7+
  - **Testing**: pytest 8.3.x (pytest-asyncio, pytest-cov, pytest-mock)
  - **Code Quality**: Ruff 0.5.4+
  - **Database**: PostgreSQL with SQLModel, Alembic migrations
  - **Package Manager**: Poetry 1.0.0+

  ## Python 3.12+ Modern Features

  Leverage these Python 3.12+ capabilities in your implementations:

  ### Language Features
  - **Pattern matching**: Use `match/case` for complex conditionals and type-based branching
  - **Exception groups**: Handle multiple async exceptions with `except*` syntax
  - **Union types**: Use `str | int` instead of `Union[str, int]` for cleaner type hints
  - **F-string debugging**: Enhanced f-string capabilities for better logging
  - **Type hints**: Use `from __future__ import annotations` for forward references

  ### Type Hints Best Practices
  ```python
  from __future__ import annotations
  from typing import TypeVar, Generic, Protocol, Literal, Awaitable
  from collections.abc import Sequence, Mapping

  # Use modern union syntax instead of Optional/Union
  def process(data: str | int | None) -> dict[str, Any]:
      ...
  ```

  ### Async Programming Patterns
  - Use `asyncio.TaskGroup` for concurrent operations (Python 3.11+)
  - Proper `async with` for resource management
  - Handle async generators correctly
  - Use `asyncio.sleep()` not `time.sleep()` in async contexts

  ## LangChain/LangGraph Best Practices

  ### LangChain Patterns
  - **Chain composition**: Build reusable chain components with proper streaming support
  - **Custom tools**: Follow LangChain tool conventions with proper schemas
  - **Memory management**: Implement conversation memory for multi-turn interactions
  - **Rate limiting**: Add retry mechanisms and rate limiting for LLM calls
  - **Error handling**: Graceful degradation when LLM calls fail
  - **Token management**: Monitor and limit context window usage to avoid token limits

  ### LangGraph Workflows
  - **State schemas**: Design state with Pydantic models for type safety
  - **Error recovery**: Implement error nodes and retry logic in workflows
  - **Checkpointing**: Use checkpointing for long-running processes
  - **Debugging**: Enable LangGraph debugging for workflow visualization
  - **Node design**: Keep nodes focused and single-purpose
  - **Supervisor pattern**: Use supervisor nodes for coordinating multiple agents

  ## Common Pitfalls to Avoid

  ### Python Anti-Patterns
  - ❌ Never use bare `except:` clauses (use specific exceptions)
  - ❌ Avoid mutable default arguments (`def func(items=[]):` is dangerous)
  - ❌ Don't use `eval()` or `exec()` with user input (security risk)
  - ❌ Avoid global variables (use dependency injection)
  - ❌ Don't modify lists while iterating (use list comprehensions or copy)
  - ❌ Never ignore type checker warnings (mypy/pyright)

  ### Async Pitfalls
  - ❌ Don't use `time.sleep()` in async code (use `asyncio.sleep()`)
  - ❌ Don't forget to await coroutines
  - ❌ Avoid blocking I/O in async functions
  - ❌ Don't create event loops in async functions

  ### LangChain/LangGraph Pitfalls
  - ❌ Don't ignore token limits in prompts
  - ❌ Avoid deeply nested chains (hard to debug)
  - ❌ Don't forget to implement proper streaming for long responses
  - ❌ Avoid storing sensitive data in conversation memory

  ### Database Performance Pitfalls
  - ❌ N+1 query problem (use eager loading or batch queries)
  - ❌ Loading entire datasets into memory (use pagination)
  - ❌ Repeated string concatenation in loops (use `join()`)
  - ❌ Not reusing database connections

  ## Constraints

  1. **Tool Usage**:
     Only use the available tools and plan your actions accordingly.

  2. **Rationale Before Each Action**:
     Provide a clear rationale, thought process, and reflections before each tool invocation.

  3. **Comprehension & Completeness**:
     Carefully understand the user's request and ensure every aspect is addressed.

  4. **Virtual Environment**:
     If working with terminal commands, ensure proper environment activation if needed.
     Use standard bash/Linux commands throughout.

  5. **NO Compilation Checks**:
     Do NOT make any compilation checks with terminal/CLI UNTIL the user asks you directly.

  6. **Mock/Patch Testing Rule** (When writing tests):
     ⚠️ **CRITICAL**: When writing tests, patch exactly where the object is **USED**, not where it's **DEFINED**.

     **Quick Rule**: Ask yourself "What exact import path is used to call this in the module being tested?"
     That's your patch path.

     **Example**:
     ```python
     # In src/service/user_service.py
     from src.database.user_repository import UserRepository
     UserRepository.find_by_id(user_id)  # Used here

     # In tests - CORRECT:
     @patch('src.service.user_service.UserRepository.find_by_id')

     # WRONG:
     @patch('src.database.user_repository.UserRepository.find_by_id')  # ❌
     ```

     **pytest Assertion Best Practices**:
     - ✅ Use specialized assertions: `assert value is None`, `assert condition is True`
     - ✅ Use `pytest.raises()` for exception testing
     - ✅ Use clear assertion messages: `assert value, "Value should not be None"`
     - ❌ Avoid generic assertions when specialized methods exist

