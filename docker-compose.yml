services:

  mermaid-server:
    image: tomwright/mermaid-server:latest
    container_name: mermaid-server
    ports:
      - "8082:80"
    restart: unless-stopped

  codemie:

    extra_hosts:
      #│ Allows to access resources on host machine via http://host.docker.internal
      #│ For example, if you're making HTTP requests to this service, change:                                  │
      #│                                                                                                       │
      #│  • From: http://localhost:10000/api/endpoint                                                          │
      #│  • To: http://host.docker.internal:10000/api/endpoint
      - "host.docker.internal:host-gateway"
    container_name: codemie
    depends_on:
      elasticsearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - google_credentials
    volumes:
      - ./src:/app/src
      - ./poetry.lock:/app/poetry.lock
      - ./pyproject.toml:/app/pyproject.toml
      - ./.env:/app/.env
      - ./tests:/app/tests
      - ./codemie-repos:/app/codemie-repos
      - ./config:/app/config
      - ./codemie-storage:/app/codemie-storage
    ports:
      - 8080:8080
    restart: on-failure
    environment:
      - ELASTIC_URL=http://elasticsearch:9200
      - PG_URL=postgresql://postgres:password@postgres:5432/postgres
      - KEYCLOAK_LOGOUT_URL=http://localhost:5010/docs
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials.json
    command: poetry run uvicorn codemie.rest_api.main:app --host=0.0.0.0 --port=8080 --reload

  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=postgres
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: "docker.elastic.co/elasticsearch/elasticsearch:8.18.4"
    container_name: elasticsearch
    volumes:
      - .elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
    restart: on-failure
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms1024m -Xmx2048m -Dcluster.routing.allocation.disk.watermark.low=94% -Dcluster.routing.allocation.disk.watermark.high=95% -Dcluster.routing.allocation.disk.watermark.flood_stage=95%"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - bootstrap.memory_lock=true
      - allow_partial_search_results=false
    healthcheck:
      test: curl --fail http://localhost:9200/_cat/health || exit 1
      interval: 10s
      timeout: 1s
      retries: 10
    mem_limit: 4g

  kibana:
    image: docker.elastic.co/kibana/kibana:8.18.4
    container_name: kibana
    depends_on:
      - elasticsearch
    ports:
      - 5601:5601
    restart: on-failure
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200

  litellm:
    image: ghcr.io/berriai/litellm-database:main-v1.81.0-stable
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
      - ./credentials.json:/app/credentials.json
    command:
      - "--config=/app/config.yaml"
    ports:
      - "4000:4000" # Map the container port to the host, change the host port if necessary
    environment:
      DATABASE_URL: "postgresql://postgres:password@postgres:5432/litellm"
      STORE_MODEL_IN_DB: "True" # allows adding models to proxy via UI
      DIAL_API_KEY: ""
      AWS_DEFAULT_REGION: us-west-2
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      GOOGLE_APPLICATION_CREDENTIALS: "/app/credentials.json"
      # If using Azure OpenAI directly, set these values
      AZURE_TENANT_ID: ""
      AZURE_CLIENT_ID: ""
      AZURE_CLIENT_SECRET: ""
    depends_on:
      - postgres  # Indicates that this service depends on the 'db' service, ensuring 'db' starts first
    healthcheck: # Defines the health check configuration for the container
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 http://localhost:4000/health/liveliness || exit 1" ]  # Command to execute for health check
      interval: 30s  # Perform health check every 30 seconds
      timeout: 10s   # Health check command times out after 10 seconds
      retries: 3     # Retry up to 3 times if health check fails
      start_period: 40s  # Wait 40 seconds after container start before beginning health checks

secrets:
  google_credentials:
    # if you don't have gcp credentials but still want to set up local deployment then create an empty file
    # acting as a stub: 'touch ${HOME}/.config/gcloud/application_default_credentials.json'
    file: ${HOME}/.config/gcloud/application_default_credentials.json
